# Cloudflare Pages config (read at build time — supersedes dashboard runtime settings).
# www is fully prerendered; only Clerk hydrates client-side (TRD v1.4 addendum).
# nodejs_compat matches the other apps' Pages setup.
name = "www-alternatif-space"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2026-06-11"
compatibility_flags = ["nodejs_compat"]

# Public values + secrets stored via Cloudflare Pages dashboard / wrangler pages secret put.
# RESEND_API_KEY is set as a Pages secret for the /api/contact endpoint.
[vars]
